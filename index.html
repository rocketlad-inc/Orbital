    ctx.beginPath(); ctx.arc(peri.x, peri.y, 2.5, 0, TWO_PI); ctx.fill();
    ctx.fillText(`Pe' ${orbit.rp.toFixed(0)} @${parent.name.toUpperCase()}`, peri.x, peri.y - 6);
    ctx.beginPath(); ctx.arc(apo.x, apo.y, 2.5, 0, TWO_PI); ctx.fill();
    ctx.fillText(`Ap' ${orbit.ra.toFixed(0)} @${parent.name.toUpperCase()}`, apo.x, apo.y - 6);
    return;
  }

  drawOrbitArc(orbit, tStart, arcEnd, { color, dashed: true, lineWidth: 1.3 });

  if (enterTime && enteredBody) {
    const bp = bodyPosition(enteredBody, enterTime);
    const bs = worldToScreen(bp.x, bp.y);
    const br = enteredBody.radius * camera.scale;
    if (enteredBody.soi && enteredBody.soi !== Infinity) {
      ctx.save();
      ctx.strokeStyle = 'rgba(255, 184, 77, 0.3)';
      ctx.lineWidth = 1;
      ctx.setLineDash([2, 4]);
      ctx.beginPath();
      ctx.arc(bs.x, bs.y, enteredBody.soi * camera.scale, 0, TWO_PI);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.restore();
    }
    ctx.save();
    ctx.globalAlpha = 0.4;
    ctx.fillStyle = enteredBody.color;
    ctx.beginPath();
    ctx.arc(bs.x, bs.y, br, 0, TWO_PI);
    ctx.fill();
    ctx.restore();
    ctx.fillStyle = 'rgba(255, 184, 77, 0.7)';
    ctx.font = '8px "JetBrains Mono", monospace';
    ctx.textAlign = 'center';
    ctx.fillText(enteredBody.name.toUpperCase(), bs.x, bs.y + br + 12);

    const encPos = orbitWorldPos(orbit, enterTime);
    const es = worldToScreen(encPos.x, encPos.y);
    ctx.save();
    ctx.strokeStyle = color;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(es.x, es.y, 5, 0, TWO_PI);
    ctx.stroke();
    ctx.fillStyle = color;
    ctx.font = '8px "JetBrains Mono", monospace';
    ctx.textAlign = 'center';
    ctx.fillText(`ENCOUNTER ${enteredBody.name.toUpperCase()}`, es.x, es.y + 16);
    ctx.fillText(`T+${(enterTime - tick).toFixed(1)}`, es.x, es.y - 10);
    ctx.restore();
    return;
  }
  if (exitTime) {
    const exitPos = orbitWorldPos(orbit, exitTime);
    const es = worldToScreen(exitPos.x, exitPos.y);
    ctx.save();
    ctx.strokeStyle = color;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(es.x, es.y, 5, 0, TWO_PI);
    ctx.stroke();
    ctx.fillStyle = color;
    ctx.font = '8px "JetBrains Mono", monospace';
    ctx.textAlign = 'center';
    ctx.fillText(`ESCAPES ${parent.name.toUpperCase()}`, es.x, es.y + 16);
    ctx.fillText(`T+${(exitTime - tick).toFixed(1)}`, es.x, es.y - 10);
    ctx.restore();
    const newParentId = parent.parent;
    if (!newParentId) return;
    const wv = orbitWorldVelocity(orbit, exitTime);
    const newOrbit = orbitFromWorldState(
      exitPos.x, exitPos.y, wv.x, wv.y,
      newParentId, exitTime, orbit.period, semiMajor(orbit)
    );
    if (newOrbit) {
      drawProjectedArcChainColored(newOrbit, exitTime, maxArcs - 1, color);
    }
  }
}

// Draw the ship's current orbit (around its current parent body)
function drawCurrentOrbit(ship, isSelected) {
  const orbit = ship.orbit;
  const parent = byId[orbit.parentBodyId];
  const pPos = bodyPosition(parent, tick);
  const ps = worldToScreen(pPos.x, pPos.y);
  const a = semiMajor(orbit);
  const e = eccentricity(orbit);
  const b = a * Math.sqrt(1 - e * e);
  const c = a * e;
  const cx = ps.x - Math.cos(orbit.omega) * c * camera.scale;
  const cy = ps.y - Math.sin(orbit.omega) * c * camera.scale;

  const color = isSelected ? '#4ecdc4' : '#2a7a73';
  ctx.save();
  ctx.strokeStyle = color;
  ctx.lineWidth = isSelected ? 1.5 : 1.1;
  ctx.beginPath();
  ctx.ellipse(cx, cy, a * camera.scale, b * camera.scale, orbit.omega, 0, TWO_PI);
  ctx.stroke();
  ctx.restore();

  // Apsis markers for selected ship
  if (isSelected) {
    const peri = {
      x: ps.x + Math.cos(orbit.omega) * orbit.rp * camera.scale,
      y: ps.y + Math.sin(orbit.omega) * orbit.rp * camera.scale,
    };
    const apo = {
      x: ps.x - Math.cos(orbit.omega) * orbit.ra * camera.scale,
      y: ps.y - Math.sin(orbit.omega) * orbit.ra * camera.scale,
    };
    ctx.fillStyle = color;
    ctx.font = '8px "JetBrains Mono", monospace';
    ctx.textAlign = 'center';
    ctx.beginPath(); ctx.arc(peri.x, peri.y, 2.5, 0, TWO_PI); ctx.fill();
    ctx.fillText(`Pe ${orbit.rp.toFixed(0)}`, peri.x, peri.y - 6);
    ctx.beginPath(); ctx.arc(apo.x, apo.y, 2.5, 0, TWO_PI); ctx.fill();
    ctx.fillText(`Ap ${orbit.ra.toFixed(0)}`, apo.x, apo.y - 6);
  }
}

// Compute the orbit AFTER the given node fires. Walk forward through prior
// nodes in plan order to build up the post-burn orbit, then return it along
// with up to one SOI transition.
// Walk through the plan, producing for each node:
//   { node, preBurnOrbit, postBurnOrbit }
// where preBurnOrbit is the orbit the node fires on (after walking through any
// SOI transitions between this node and the previous one or ship start), and
// postBurnOrbit is the orbit after the burn is applied.
function computeNodeChain(ship) {
  const sortedNodes = [...ship.nodes].sort((a, b) => a.id - b.id);
  const chain = [];
  let cursorOrbit = ship.orbit;
  let cursorTick = Math.max(tick, ship.orbit.epoch || 0);
  for (const node of sortedNodes) {
    let walkOrbit = cursorOrbit;
    let walkTick = cursorTick;
    const targetType = node.anchor === 'encounter' ? 'enter' :
                       node.anchor === 'exit' ? 'exit' :
                       node.anchor === 'capture' ? 'enter' : null;
    // For all anchor types, walk through intermediate SOI events. For encounter/exit
    // we also consume the matching event at node.t. For 'capture', we MUST consume
    // an 'enter' event before node.t (the periapsis comes after the entry).
    for (let i = 0; i < 6 && walkTick < node.t - 1e-6; i++) {
      const remaining = node.t - walkTick;
      const ev = findNextSOIEvent(walkOrbit, walkTick, Math.min(remaining + 5, TRAJ_MAX_TICKS));
      if (!ev) break;
      const isAnchorMatch = (targetType && ev.type === targetType && Math.abs(ev.t - node.t) < 1.0);
      const isIntermediate = ev.t < node.t - 1e-6;
      if (!isAnchorMatch && !isIntermediate) break;
      if (!ev.newOrbit) break;
      walkOrbit = ev.newOrbit;
      walkTick = ev.t;
    }
    const preBurnOrbit = walkOrbit;
    const postBurnOrbit = nodeDv(node) > 0 ? applyNodeToOrbit(preBurnOrbit, node) : preBurnOrbit;
    chain.push({ node, preBurnOrbit, postBurnOrbit });
    cursorOrbit = postBurnOrbit;
    cursorTick = node.t;
  }
  return chain;
}

function getOrbitAfterNode(ship, targetNode) {
  const chain = computeNodeChain(ship);
  for (const link of chain) {
    if (link.node.id === targetNode.id) return link.postBurnOrbit;
  }
  return ship.orbit;
}

function preBurnOrbitForNode(ship, targetNode) {
  const chain = computeNodeChain(ship);
  for (const link of chain) {
    if (link.node.id === targetNode.id) return link.preBurnOrbit;
  }
  return ship.orbit;
}

// Draw the orbit that results from the focused node, plus optionally one SOI
// transition (the first one within ~1.5 orbits).
function drawProjectedOrbitForNode(ship, node) {
  const postOrbit = getOrbitAfterNode(ship, node);
  if (nodeDv(node) <= 0) return;
  // Draw the chain of arcs: post-burn orbit, optionally followed by post-exit orbit.
  drawProjectedArcChain(postOrbit, node.t, 2);
}

// Recursively draw a chain of projected arcs in different SOIs, up to maxArcs deep.
// Each arc may end in: exit (continue in new parent's frame), enter (stop, show encounter),
// or budget exhaustion (full ellipse if closed, partial otherwise).
function drawProjectedArcChain(orbit, tStart, maxArcs) {
  if (maxArcs <= 0) return;
  const parent = byId[orbit.parentBodyId];
  const tEnd = tStart + Math.min(orbit.period * 1.5, TRAJ_MAX_TICKS);

  let exitTime = null;
  let enterTime = null;
  let enteredBody = null;

  const stepSize = 0.5;
  for (let t = tStart + stepSize; t <= tEnd; t += stepSize) {
    const pos = orbitWorldPos(orbit, t);
    // Exit?
    if (parent.id !== 'sol') {
      const pp = bodyPosition(parent, t);
      const dx = pos.x - pp.x, dy = pos.y - pp.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist > parent.soi) {
        exitTime = bisectSOIExit(orbit, parent, t - stepSize, t);
        break;
      }
    }
    // Enter?
    for (const body of BODIES) {
      if (body.id === 'sol' || body.id === parent.id) continue;
      if (body.parent !== parent.id) continue;
      const bp = bodyPosition(body, t);
      const dx = pos.x - bp.x, dy = pos.y - bp.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < body.soi) {
        enterTime = bisectSOIEnter(orbit, body, t - stepSize, t);
        enteredBody = body;
        break;
      }
    }
    if (enterTime) break;
  }

  const arcEnd = exitTime || enterTime || tEnd;
  const isClosedFullOrbit = !exitTime && !enterTime && orbit.period < TRAJ_MAX_TICKS * 0.9;

  if (isClosedFullOrbit) {
    // Full ellipse
    const pPos = bodyPosition(parent, tick);
    const ps = worldToScreen(pPos.x, pPos.y);
    const a = semiMajor(orbit);
    const e = eccentricity(orbit);
    const b = a * Math.sqrt(1 - e * e);
    const c = a * e;
    const cx = ps.x - Math.cos(orbit.omega) * c * camera.scale;
    const cy = ps.y - Math.sin(orbit.omega) * c * camera.scale;
    ctx.save();
    ctx.strokeStyle = '#ffb84d';
    ctx.lineWidth = 1.3;
    ctx.setLineDash([5, 5]);
    ctx.beginPath();
    ctx.ellipse(cx, cy, a * camera.scale, b * camera.scale, orbit.omega, 0, TWO_PI);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.restore();

    const peri = {
      x: ps.x + Math.cos(orbit.omega) * orbit.rp * camera.scale,
      y: ps.y + Math.sin(orbit.omega) * orbit.rp * camera.scale,
    };
    const apo = {
      x: ps.x - Math.cos(orbit.omega) * orbit.ra * camera.scale,
      y: ps.y - Math.sin(orbit.omega) * orbit.ra * camera.scale,
    };
    ctx.fillStyle = '#ffb84d';
    ctx.font = '8px "JetBrains Mono", monospace';
    ctx.textAlign = 'center';
    ctx.beginPath(); ctx.arc(peri.x, peri.y, 2.5, 0, TWO_PI); ctx.fill();
    ctx.fillText(`Pe' ${orbit.rp.toFixed(0)} @${parent.name.toUpperCase()}`, peri.x, peri.y - 6);
    ctx.beginPath(); ctx.arc(apo.x, apo.y, 2.5, 0, TWO_PI); ctx.fill();
    ctx.fillText(`Ap' ${orbit.ra.toFixed(0)} @${parent.name.toUpperCase()}`, apo.x, apo.y - 6);
    return;
  }

  // Partial arc
  drawOrbitArc(orbit, tStart, arcEnd, {
    color: '#ffb84d',
    dashed: true,
    lineWidth: 1.3,
  });

  if (enterTime && enteredBody) {
    // Encounter ghost body + ring
    const bp = bodyPosition(enteredBody, enterTime);
    const bs = worldToScreen(bp.x, bp.y);
    const br = enteredBody.radius * camera.scale;
    if (enteredBody.soi && enteredBody.soi !== Infinity) {
      ctx.save();
      ctx.strokeStyle = 'rgba(255, 184, 77, 0.3)';
      ctx.lineWidth = 1;
      ctx.setLineDash([2, 4]);
      ctx.beginPath();
      ctx.arc(bs.x, bs.y, enteredBody.soi * camera.scale, 0, TWO_PI);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.restore();
    }
    ctx.save();
    ctx.globalAlpha = 0.4;
    ctx.fillStyle = enteredBody.color;
    ctx.beginPath();
    ctx.arc(bs.x, bs.y, br, 0, TWO_PI);
    ctx.fill();
    ctx.restore();

    ctx.fillStyle = 'rgba(255, 184, 77, 0.7)';
    ctx.font = '8px "JetBrains Mono", monospace';
    ctx.textAlign = 'center';
    ctx.fillText(enteredBody.name.toUpperCase(), bs.x, bs.y + br + 12);

    const encPos = orbitWorldPos(orbit, enterTime);
    const es = worldToScreen(encPos.x, encPos.y);
    ctx.save();
    ctx.strokeStyle = '#ffb84d';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(es.x, es.y, 5, 0, TWO_PI);
    ctx.stroke();
    ctx.fillStyle = '#ffb84d';
    ctx.font = '8px "JetBrains Mono", monospace';
    ctx.textAlign = 'center';
    ctx.fillText(`ENCOUNTER ${enteredBody.name.toUpperCase()}`, es.x, es.y + 16);
    ctx.fillText(`T+${(enterTime - tick).toFixed(1)}`, es.x, es.y - 10);
    ctx.restore();
    // Stop chain at SOI entry — we don't draw inside the encountered body.
    return;
  }

  if (exitTime) {
    // Draw the exit marker, then recursively project in the new parent's frame.
    const exitPos = orbitWorldPos(orbit, exitTime);
    const es = worldToScreen(exitPos.x, exitPos.y);
    ctx.save();
    ctx.strokeStyle = '#ffb84d';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(es.x, es.y, 5, 0, TWO_PI);
    ctx.stroke();
    ctx.fillStyle = '#ffb84d';
    ctx.font = '8px "JetBrains Mono", monospace';
    ctx.textAlign = 'center';
    ctx.fillText(`ESCAPES ${parent.name.toUpperCase()}`, es.x, es.y + 16);
    ctx.fillText(`T+${(exitTime - tick).toFixed(1)}`, es.x, es.y - 10);
    ctx.restore();

    // Compute the new orbit in the parent's parent frame (e.g. Inara -> Sol)
    const newParentId = parent.parent;
    if (!newParentId) return;
    const wv = orbitWorldVelocity(orbit, exitTime);
    const newOrbit = orbitFromWorldState(
      exitPos.x, exitPos.y, wv.x, wv.y,
      newParentId, exitTime, orbit.period, semiMajor(orbit)
    );
    if (newOrbit) {
      drawProjectedArcChain(newOrbit, exitTime, maxArcs - 1);
    }
  }
}

function drawNodes(ship) {
  const chain = computeNodeChain(ship);
  for (const link of chain) {
    const { node, preBurnOrbit: orbit } = link;
    const parent = byId[orbit.parentBodyId];
    const pPos = bodyPosition(parent, node.t);
    const local = localPositionAt(orbit, node.t);
    const s = worldToScreen(pPos.x + local.x, pPos.y + local.y);

    const isSelectedNode = node.id === selectedNodeId;
    const isCommitted = node.committed;

    ctx.save();
    ctx.translate(s.x, s.y);
    ctx.rotate(Math.PI / 4);
    if (isCommitted) {
      ctx.fillStyle = isSelectedNode ? '#ffb84d' : 'rgba(255, 184, 77, 0.85)';
      ctx.fillRect(-5, -5, 10, 10);
      ctx.strokeStyle = '#ffb84d';
      ctx.lineWidth = 1.5;
      ctx.strokeRect(-5, -5, 10, 10);
    } else {
      ctx.fillStyle = isSelectedNode ? 'rgba(255, 184, 77, 0.25)' : 'rgba(255, 184, 77, 0.08)';
      ctx.fillRect(-5, -5, 10, 10);
      ctx.strokeStyle = isSelectedNode ? '#ffb84d' : 'rgba(255, 184, 77, 0.55)';
      ctx.lineWidth = 1;
      ctx.setLineDash([2, 2]);
      ctx.strokeRect(-5, -5, 10, 10);
      ctx.setLineDash([]);
    }
    ctx.restore();

    ctx.fillStyle = isCommitted ? '#ffb84d' : 'rgba(255, 184, 77, 0.7)';
    ctx.font = '9px "JetBrains Mono", monospace';
    ctx.textAlign = 'center';
    let anchorLabel = '';
    if (node.anchor === 'periapsis') anchorLabel = 'Pe';
    else if (node.anchor === 'apoapsis') anchorLabel = 'Ap';
    else if (node.anchor === 'encounter') anchorLabel = 'ENC';
    else if (node.anchor === 'exit') anchorLabel = 'EXIT';
    else if (node.anchor === 'capture') anchorLabel = 'CAP';
    else if (node.anchor === 'absolute') anchorLabel = 'TX';
    const label = (isCommitted ? '● ' : '◇ ') + `${anchorLabel} T+${(node.t - tick).toFixed(1)}`;
    ctx.fillText(label, s.x, s.y - 12);

    ctx.font = '7px "JetBrains Mono", monospace';
    ctx.fillStyle = 'rgba(78, 205, 196, 0.85)';
    ctx.fillText(`@${parent.name.toUpperCase()}`, s.x, s.y + 14);
    ctx.fillStyle = isCommitted ? '#ffb84d' : 'rgba(255, 184, 77, 0.7)';
    ctx.font = '9px "JetBrains Mono", monospace';

    if (isSelectedNode) drawNodeHandles(node, orbit, s);
  }
}

const HANDLE_SCREEN_LENGTH = 50;
const HANDLE_DV_SCALE = 0.01;  // dv units per pixel — smaller burns are realistic

function drawNodeHandles(node, orbit, screenPos) {
  const { prograde, radialOut } = velocityVectorsAt(orbit, node.t);
  const sx = screenPos.x, sy = screenPos.y;

  const directions = {
    prograde:    { x: prograde.x,   y: prograde.y,   cssVar: '--prograde',   label: 'PG' },
    retrograde:  { x: -prograde.x,  y: -prograde.y,  cssVar: '--retrograde', label: 'RG' },
    'radial-out':{ x: radialOut.x,  y: radialOut.y,  cssVar: '--radial-out', label: 'R+' },
    'radial-in': { x: -radialOut.x, y: -radialOut.y, cssVar: '--radial-in',  label: 'R-' },
  };
  const dvAmount = {
    prograde:     node.dv.prograde > 0 ?  node.dv.prograde : 0,
    retrograde:   node.dv.prograde < 0 ? -node.dv.prograde : 0,
    'radial-out': node.dv.radial   > 0 ?  node.dv.radial   : 0,
    'radial-in':  node.dv.radial   < 0 ? -node.dv.radial   : 0,
  };

  for (const [key, dir] of Object.entries(directions)) {
    const extra = dvAmount[key] / HANDLE_DV_SCALE;
    const length = HANDLE_SCREEN_LENGTH + extra;
    const ex = sx + dir.x * length;
    const ey = sy + dir.y * length;
    const cssColor = getComputedStyle(document.documentElement).getPropertyValue(dir.cssVar).trim();

    ctx.strokeStyle = cssColor;
    ctx.lineWidth = 1.2;
    ctx.setLineDash(dvAmount[key] > 0 ? [] : [3, 3]);
    ctx.beginPath();
    ctx.moveTo(sx, sy);
    ctx.lineTo(ex, ey);
    ctx.stroke();
    ctx.setLineDash([]);

    ctx.fillStyle = cssColor;
    ctx.beginPath();
    ctx.arc(ex, ey, 6, 0, TWO_PI);
    ctx.fill();

    ctx.fillStyle = '#0a0e14';
    ctx.font = 'bold 8px "JetBrains Mono", monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(dir.label, ex, ey);
    ctx.textBaseline = 'alphabetic';

    if (dvAmount[key] > 0) {
      ctx.fillStyle = cssColor;
      ctx.textAlign = 'center';
      ctx.font = '9px "JetBrains Mono", monospace';
      ctx.fillText(dvAmount[key].toFixed(1), ex + dir.x * 14, ey + dir.y * 14 + 3);
    }
  }
}

function render() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  for (const body of BODIES) drawBodyOrbit(body);
  for (const body of BODIES) drawBody(body);
  for (const ship of SHIPS) drawShip(ship);
}

// ---------- CAMERA ----------
function focusSystem() {
  viewTarget = 'system';
  manualCamera = false;
  camera.x = 0; camera.y = 0;
  camera.scale = Math.min(canvas.width, canvas.height) / 1100;
}

function focusBody(bodyId) {
  viewTarget = bodyId;
  manualCamera = false;
  const body = byId[bodyId];
  const pos = bodyPosition(body, tick);
  camera.x = pos.x; camera.y = pos.y;
  let viewRadius;
  if (body.id === 'sol') viewRadius = 600;
  else if (body.soi && body.soi !== Infinity) viewRadius = body.soi * 1.4;
  else viewRadius = 100;
  camera.scale = Math.min(canvas.width, canvas.height) / (viewRadius * 2);
}

function updateCamera() {
  if (manualCamera) return;
  if (viewTarget && viewTarget !== 'system') {
    const body = byId[viewTarget];
    if (body) {
      const pos = bodyPosition(body, tick);
      camera.x = pos.x; camera.y = pos.y;
    }
  }
}

// ---------- HIT TESTS ----------
function hitBody(sx, sy) {
  for (let i = BODIES.length - 1; i >= 0; i--) {
    const body = BODIES[i];
    const pos = bodyPosition(body, tick);
    const s = worldToScreen(pos.x, pos.y);
    const r = Math.max(8, body.radius * camera.scale + 4);
    const dx = sx - s.x, dy = sy - s.y;
    if (dx * dx + dy * dy < r * r) return body.id;
  }
  return null;
}

function hitShip(sx, sy) {
  for (const ship of SHIPS) {
    const pos = shipPositionWorld(ship, tick);
    const s = worldToScreen(pos.x, pos.y);
    const dx = sx - s.x, dy = sy - s.y;
    if (dx * dx + dy * dy < 100) return ship.id;
  }
  return null;
}

// Return the orbit a specific node fires on (its pre-burn orbit) — defined above
// via computeNodeChain.

function hitNode(sx, sy, ship) {
  if (!ship) return null;
  const chain = computeNodeChain(ship);
  for (const link of chain) {
    const { node, preBurnOrbit: orbit } = link;
    const parent = byId[orbit.parentBodyId];
    const pPos = bodyPosition(parent, node.t);
    const local = localPositionAt(orbit, node.t);
    const s = worldToScreen(pPos.x + local.x, pPos.y + local.y);
    const dx = sx - s.x, dy = sy - s.y;
    if (dx * dx + dy * dy < 100) return node.id;
  }
  return null;
}

function hitHandle(sx, sy, ship, node) {
  if (!node) return null;
  const orbit = preBurnOrbitForNode(ship, node);
  const parent = byId[orbit.parentBodyId];
  const pPos = bodyPosition(parent, node.t);
  const local = localPositionAt(orbit, node.t);
  const center = worldToScreen(pPos.x + local.x, pPos.y + local.y);
  const { prograde, radialOut } = velocityVectorsAt(orbit, node.t);

  const dvAmount = {
    prograde:     node.dv.prograde > 0 ?  node.dv.prograde : 0,
    retrograde:   node.dv.prograde < 0 ? -node.dv.prograde : 0,
    'radial-out': node.dv.radial   > 0 ?  node.dv.radial   : 0,
    'radial-in':  node.dv.radial   < 0 ? -node.dv.radial   : 0,
  };
  const dirs = {
    prograde:    { x: prograde.x,   y: prograde.y },
    retrograde:  { x: -prograde.x,  y: -prograde.y },
    'radial-out':{ x: radialOut.x,  y: radialOut.y },
    'radial-in': { x: -radialOut.x, y: -radialOut.y },
  };
  for (const [key, dir] of Object.entries(dirs)) {
    const length = HANDLE_SCREEN_LENGTH + (dvAmount[key] / HANDLE_DV_SCALE);
    const ex = center.x + dir.x * length;
    const ey = center.y + dir.y * length;
    const dx = sx - ex, dy = sy - ey;
    if (dx * dx + dy * dy < 100) return key;
  }
  return null;
}

function hitOrbit(sx, sy, ship) {
  if (!ship) return null;
  const traj = ship._trajectory || (ship._trajectory = computeTrajectory(ship.orbit, ship.nodes, ship.orbit.epoch || 0));
  let closest = null;
  for (const arc of traj) {
    if (arc.tEnd < tick) continue;
    const tA = Math.max(arc.tStart, tick);
    const tB = arc.tEnd;
    const duration = tB - tA;
    if (duration <= 0) continue;
    const samples = Math.max(20, Math.min(150, Math.ceil(duration * 4)));
    const parent = byId[arc.orbit.parentBodyId];
    // Bias factor: prefer non-Sol (deeper) arcs by treating them as visually
    // "closer". This means clicking on the trajectory inside Verda's SOI
    // selects the Verda arc, not the Sol arc that passes through the same area.
    const depthBias = parent.id === 'sol' ? 1.0 : 0.5;
    for (let i = 0; i <= samples; i++) {
      const sampleTick = tA + (i / samples) * duration;
      const pPos = bodyPosition(parent, sampleTick);
      const local = localPositionAt(arc.orbit, sampleTick);
      const s = worldToScreen(pPos.x + local.x, pPos.y + local.y);
      const dx = sx - s.x, dy = sy - s.y;
      const d2 = (dx * dx + dy * dy) * depthBias;
      if (d2 < 144 && (!closest || d2 < closest.d2)) {
        closest = { t: sampleTick, d2 };
      }
    }
  }
  return closest ? closest.t : null;
}

// ---------- MOUSE HANDLING ----------
canvas.addEventListener('mousedown', (e) => {
  if (e.button !== 0) return; // only left-click for selection / handles
  const rect = canvas.getBoundingClientRect();
  const sx = e.clientX - rect.left;
  const sy = e.clientY - rect.top;

  const ship = shipById[selectedShipId];

  // 1) Handle hit (must be first — handles overlap orbits)
  if (ship && selectedNodeId) {
    const node = ship.nodes.find(n => n.id === selectedNodeId);
    if (node) {
      const handle = hitHandle(sx, sy, ship, node);
      if (handle) {
        dragging = { kind: 'handle', handle, nodeId: node.id, shipId: ship.id };
        return;
      }
    }
  }

  // 2) Node hit
  if (ship) {
    const nodeId = hitNode(sx, sy, ship);
    if (nodeId !== null) {
      selectedNodeId = nodeId;
      renderShipPanel();
      return;
    }
  }

  // (Click-on-orbit placement removed. Use the "Add Step" buttons in the ship panel.)

  // 4) Ship hit
  const sid = hitShip(sx, sy);
  if (sid) { selectShip(sid); return; }

  // 5) Body hit
  const bid = hitBody(sx, sy);
  if (bid) {
    if (pickingTarget && selectedShipId) {
      // Confirm the target and plan a transfer
      const ship = shipById[selectedShipId];
      if (bid === ship.orbit.parentBodyId) {
        flashStatus('CANNOT TRANSFER TO CURRENT PARENT');
      } else if (bid === 'sol') {
        flashStatus('CANNOT TRANSFER TO SOL');
      } else {
        pickingTarget = false;
        applyTransfer(bid);
      }
      return;
    }
    selectBody(bid);
    return;
  }

  // Cancel target picking on empty-area click
  if (pickingTarget) {
    pickingTarget = false;
    flashStatus('TARGET SELECTION CANCELLED');
    renderShipPanel();
    return;
  }

  // 6) Empty: deselect node
  if (selectedNodeId) { selectedNodeId = null; renderShipPanel(); }
});

canvas.addEventListener('mousemove', (e) => {
  if (!dragging) return;
  const rect = canvas.getBoundingClientRect();
  const sx = e.clientX - rect.left;
  const sy = e.clientY - rect.top;

  if (dragging.kind === 'handle') {
    const ship = shipById[dragging.shipId];
    const node = ship.nodes.find(n => n.id === dragging.nodeId);
    if (!node) return;

    const orbit = preBurnOrbitForNode(ship, node);
    const parent = byId[orbit.parentBodyId];
    const pPos = bodyPosition(parent, node.t);
    const local = localPositionAt(orbit, node.t);
    const center = worldToScreen(pPos.x + local.x, pPos.y + local.y);
    const { prograde, radialOut } = velocityVectorsAt(orbit, node.t);

    const dx = sx - center.x, dy = sy - center.y;
    let dirVec;
    switch (dragging.handle) {
      case 'prograde':   dirVec = prograde; break;
      case 'retrograde': dirVec = { x: -prograde.x, y: -prograde.y }; break;
      case 'radial-out': dirVec = radialOut; break;
      case 'radial-in':  dirVec = { x: -radialOut.x, y: -radialOut.y }; break;
    }
    const proj = dx * dirVec.x + dy * dirVec.y;
    const handleLen = Math.max(0, proj - HANDLE_SCREEN_LENGTH);
    const dv = handleLen * HANDLE_DV_SCALE;

    switch (dragging.handle) {
      case 'prograde':   node.dv.prograde =  dv; break;
      case 'retrograde': node.dv.prograde = -dv; break;
      case 'radial-out': node.dv.radial   =  dv; break;
      case 'radial-in':  node.dv.radial   = -dv; break;
    }
    // Subsequent nodes' apsis times depend on this node's burn. Recompute.
    recomputeNodeTimes(ship);
    renderShipPanel();
  }
});

canvas.addEventListener('mouseup', (e) => {
  dragging = null;
  panState = null;
});

// Pan with right-click or middle-click drag
canvas.addEventListener('mousedown', (e) => {
  if (e.button === 2 || e.button === 1) {
    e.preventDefault();
    const rect = canvas.getBoundingClientRect();
    panState = {
      startX: e.clientX - rect.left,
      startY: e.clientY - rect.top,
      camX: camera.x,
      camY: camera.y,
    };
  }
}, true); // capture phase so this runs before the main mousedown

canvas.addEventListener('mousemove', (e) => {
  if (!panState) return;
  const rect = canvas.getBoundingClientRect();
  const sx = e.clientX - rect.left;
  const sy = e.clientY - rect.top;
  const dx = sx - panState.startX;
  const dy = sy - panState.startY;
  camera.x = panState.camX - dx / camera.scale;
  camera.y = panState.camY - dy / camera.scale;
  manualCamera = true;
});

canvas.addEventListener('contextmenu', (e) => e.preventDefault());

// Zoom with mouse wheel, anchored at cursor position
canvas.addEventListener('wheel', (e) => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const sx = e.clientX - rect.left;
  const sy = e.clientY - rect.top;
  // World point under cursor before zoom
  const worldX = (sx - canvas.width / 2) / camera.scale + camera.x;
  const worldY = (sy - canvas.height / 2) / camera.scale + camera.y;
  // Zoom factor — wheel up = in
  const factor = e.deltaY < 0 ? 1.15 : 1 / 1.15;
  camera.scale = Math.max(0.005, Math.min(50, camera.scale * factor));
  // Adjust camera so that worldX/worldY stays under the cursor
  camera.x = worldX - (sx - canvas.width / 2) / camera.scale;
  camera.y = worldY - (sy - canvas.height / 2) / camera.scale;
  manualCamera = true;
}, { passive: false });

// Keyboard zoom
window.addEventListener('keydown', (e) => {
  if (e.key === '+' || e.key === '=') {
    camera.scale = Math.min(50, camera.scale * 1.2);
    manualCamera = true;
  } else if (e.key === '-' || e.key === '_') {
    camera.scale = Math.max(0.005, camera.scale / 1.2);
    manualCamera = true;
  } else if (e.key === 'f' || e.key === 'F') {
    // 'f' to focus on selected ship's parent body
    if (selectedShipId) {
      const ship = shipById[selectedShipId];
      focusBody(ship.orbit.parentBodyId);
    }
  } else if (e.key === 'Escape') {
    focusSystem();
  }
});

// ---------- SELECTION ----------
function selectShip(id) {
  selectedShipId = id;
  selectedNodeId = null;
  pickingTarget = false;
  orbitChangePanelOpen = false;
  advancedStepsOpen = false;
  closeInspector();
  const ship = shipById[id];
  if (ship) focusBody(ship.orbit.parentBodyId);
  renderRoster();
  renderShipPanel();
}

function deselectShip() {
  selectedShipId = null;
  selectedNodeId = null;
  document.getElementById('ship-panel').classList.add('hidden');
  renderRoster();
  focusSystem();
}

function selectBody(id) {
  selectedBodyId = id;
  renderInspector();
}

function closeInspector() {
  selectedBodyId = null;
  document.getElementById('inspector').classList.add('hidden');
}

function selectNode(id) {
  selectedNodeId = id;
  renderShipPanel();
}

function deleteNode(id) {
  const ship = shipById[selectedShipId];
  if (!ship) return;
  ship.nodes = ship.nodes.filter(n => n.id !== id);
  recomputeNodeTimes(ship);
  if (selectedNodeId === id) selectedNodeId = null;
  renderShipPanel();
  flashStatus('STEP DELETED');
}

// ---------- UI ----------
function renderRoster() {
  const el = document.getElementById('roster-body');
  el.innerHTML = SHIPS.map(s => {
    const orbit = s.orbit;
    const cls = s.id === selectedShipId ? 'ship-row selected' : 'ship-row';
    return `
      <div class="${cls}" onclick="selectShip('${s.id}')">
        <div class="name">${s.name}</div>
        <div class="info">${byId[s.parentBodyId].name.toUpperCase()} · Pe ${orbit.rp.toFixed(0)} · Ap ${orbit.ra.toFixed(0)}</div>
      </div>
    `;
  }).join('');
}

function renderInspector() {
  if (!selectedBodyId) return;
  const body = byId[selectedBodyId];
  document.getElementById('inspector').classList.remove('hidden');
  document.getElementById('inspector-title').textContent = body.name.toUpperCase();
  let html = `<div class="row"><span class="k">CLASS</span><span class="v">${body.type.replace('-', ' ').toUpperCase()}</span></div>`;
  if (body.soi && body.soi !== Infinity) {
    html += `<div class="row"><span class="k">SOI RADIUS</span><span class="v">${body.soi}</span></div>`;
  }
  if (body.resources) {
    html += '<div class="divider"></div>';
    html += '<div class="section-label">YIELD / TICK</div>';
    html += `<div class="row"><span class="k">FUEL</span><span class="v">${body.resources.fuel}</span></div>`;
    html += `<div class="row"><span class="k">GOLD</span><span class="v">${body.resources.gold}</span></div>`;
    html += `<div class="row"><span class="k">METAL</span><span class="v">${body.resources.metal}</span></div>`;
    html += `<div class="row"><span class="k">SCIENCE</span><span class="v">${body.resources.sci}</span></div>`;
  }
  html += `<div class="divider"></div>`;
  html += `<button class="btn-primary" onclick="focusBody('${body.id}')">FOCUS CAMERA</button>`;
  if (body.id !== 'sol') {
    html += `<button class="btn-primary" style="margin-top:4px; background: rgba(255,184,77,0.06); border-color: var(--accent); color: var(--accent);" onclick="focusSystem()">VIEW SYSTEM</button>`;
  }
  document.getElementById('inspector-body').innerHTML = html;
}

function renderShipPanel() {
  if (!selectedShipId) {
    document.getElementById('ship-panel').classList.add('hidden');
    return;
  }
  const ship = shipById[selectedShipId];
  document.getElementById('ship-panel').classList.remove('hidden');
  document.getElementById('ship-panel-title').textContent = ship.name.toUpperCase();

  const orbit = ship.orbit;
  const direction = orbit.direction === 1 ? 'PROGRADE' : 'RETROGRADE';
  const sortedNodes = [...ship.nodes].sort((a, b) => a.id - b.id);
  const totalFuel = sortedNodes.reduce((s, n) => s + nodeFuelCost(n), 0);

  let html = `
    <div class="row"><span class="k">PARENT</span><span class="v">${byId[orbit.parentBodyId].name.toUpperCase()}</span></div>
    <div class="row"><span class="k">PERIAPSIS</span><span class="v">${orbit.rp.toFixed(1)}</span></div>
    <div class="row"><span class="k">APOAPSIS</span><span class="v">${orbit.ra.toFixed(1)}</span></div>
    <div class="row"><span class="k">PERIOD</span><span class="v">${orbit.period.toFixed(1)} TICKS</span></div>
    <div class="row"><span class="k">FUEL</span><span class="v">${Math.round(ship.fuel)} / ${ship.maxFuel}</span></div>
    <div class="divider"></div>
  `;

  // Plan steps (sequential)
  html += `<div class="section-label">PLAN STEPS</div>`;

  if (sortedNodes.length === 0) {
    html += `<div class="help" style="margin-bottom:8px;">No steps yet. Click below to add your first burn.</div>`;
  } else {
    // Use the unified chain that walks through SOI transitions between burns.
    const chain = computeNodeChain(ship);
    for (let i = 0; i < chain.length; i++) {
      const { node, preBurnOrbit, postBurnOrbit } = chain[i];
      const isSelectedN = node.id === selectedNodeId;
      const dv = nodeDv(node);
      const fc = nodeFuelCost(node);
      const burnParent = byId[preBurnOrbit.parentBodyId];

      const anchorLabel = node.anchor === 'periapsis' ? 'PERIAPSIS' :
                          node.anchor === 'apoapsis' ? 'APOAPSIS' :
                          node.anchor === 'encounter' ? 'ENCOUNTER' :
                          node.anchor === 'exit' ? 'SOI EXIT' :
                          node.anchor === 'capture' ? 'CAPTURE (target Pe)' :
                          node.anchor === 'absolute' ? 'TRANSFER DEPARTURE' : 'CUSTOM';

      let pillsHtml = '';
      if (node.dv.prograde > 0) pillsHtml += `<span class="vec-pill pg">PG +${node.dv.prograde.toFixed(1)}</span>`;
      if (node.dv.prograde < 0) pillsHtml += `<span class="vec-pill rg">RG +${(-node.dv.prograde).toFixed(1)}</span>`;
      if (node.dv.radial > 0)   pillsHtml += `<span class="vec-pill ro">R+ ${node.dv.radial.toFixed(1)}</span>`;
      if (node.dv.radial < 0)   pillsHtml += `<span class="vec-pill ri">R- ${(-node.dv.radial).toFixed(1)}</span>`;
      if (!pillsHtml) pillsHtml = `<span style="color: var(--fg-dim);">drag handles to set Δv</span>`;

      const statusBadge = node.committed
        ? `<span style="color: var(--accent);">● COMMITTED</span>`
        : `<span style="color: var(--fg-dim);">◇ PLAN</span>`;
      const cardCls = node.committed ? 'committed' : 'planned';

      const canCommit = dv > 0 && !node.committed && ship.fuel >= fc;
      const postParent = byId[postBurnOrbit.parentBodyId];
      const postParentSOI = postParent.soi || Infinity;
      const escapesAfterBurn = postBurnOrbit.ra > postParentSOI;
      let resultLabel;
      let resultColor = 'var(--fg-dim)';
      if (dv <= 0) {
        resultLabel = '→ no change';
      } else if (escapesAfterBurn) {
        resultLabel = `→ Pe ${postBurnOrbit.rp.toFixed(0)} · ESCAPES ${postParent.name.toUpperCase()} (ra ${postBurnOrbit.ra.toFixed(0)} > SOI ${postParentSOI})`;
        resultColor = 'var(--hostile)';
      } else {
        resultLabel = `→ CAPTURED · Pe ${postBurnOrbit.rp.toFixed(0)} Ap ${postBurnOrbit.ra.toFixed(0)} (around ${postParent.name.toUpperCase()})`;
        resultColor = 'var(--friendly)';
      }

      html += `
        <div class="node-card ${cardCls} ${isSelectedN ? 'upcoming' : ''}" onclick="selectNode(${node.id})">
          <div class="nc-title">
            <span>STEP ${i + 1} · ${anchorLabel} · T+${(node.t - tick).toFixed(1)}</span>
            <span>${statusBadge}</span>
          </div>
          <div class="row" style="font-size:9px; padding:2px 0;"><span class="k">BURN AROUND</span><span class="v" style="color: var(--friendly);">${burnParent.name.toUpperCase()}</span></div>
          <div class="nc-vector">${pillsHtml}</div>
          <div style="font-size:9px; color: ${resultColor}; margin-top:4px;">${resultLabel}</div>
          ${isSelectedN ? `
            <div style="display:flex; gap:4px; margin-top:6px;">
              ${node.committed
                ? `<button class="btn-danger" style="flex:1;" onclick="event.stopPropagation(); deleteNode(${node.id})">CANCEL</button>`
                : `<button class="btn-primary" style="flex:1;" onclick="event.stopPropagation(); commitNode(${node.id})" ${canCommit ? '' : 'disabled'}>COMMIT</button>
                   <button class="btn-danger" style="flex:1;" onclick="event.stopPropagation(); deleteNode(${node.id})">DELETE</button>`
              }
            </div>
          ` : ''}
        </div>
      `;
    }

    // Plan summary
    if (totalFuel > 0) {
      html += `<div class="row" style="margin-top:6px;"><span class="k">TOTAL PLAN FUEL</span><span class="v">${totalFuel}</span></div>`;
    }
  }

  // Add-step section. Replaces hand-tuned per-anchor adds with two high-level
  // maneuver planners: Transfer (heliocentric Hohmann to another body) and
  // Orbit Change (adjust Pe/Ap within current SOI). Manual per-apsis adds are
  // available behind an "Advanced" toggle.
  html += `<div class="divider"></div>`;

  if (pickingTarget) {
    // Targeting mode
    html += `<div class="section-label" style="color: var(--accent);">SELECT TARGET</div>`;
    html += `<div class="help" style="margin-bottom:8px;">Click any planet on the map to plan a Hohmann transfer.</div>`;
    html += `<button class="btn-danger" onclick="cancelTargetPicking()">CANCEL</button>`;
  } else {
    html += `<div class="section-label">PLAN A MANEUVER</div>`;
    // Available bodies for transfer (must be different from current parent and not Sol)
    const transferTargets = BODIES.filter(b => b.id !== 'sol' && b.id !== ship.orbit.parentBodyId && b.parent === 'sol');
    if (transferTargets.length > 0) {
      html += `<button class="btn-primary" style="margin-bottom:4px;" onclick="startTargetPicking()">⇒ TRANSFER TO ANOTHER BODY</button>`;
    }
    html += `<button class="btn-primary" onclick="openOrbitChangePanel()">↻ CHANGE ORBIT (Pe / Ap)</button>`;

    // Inline orbit-change form when toggled
    if (orbitChangePanelOpen) {
      const orbit = ship.orbit;
      html += `
        <div style="margin-top:8px; padding:8px; border:1px solid var(--accent); background:rgba(255,184,77,0.04);">
          <div class="row"><span class="k">CURRENT Pe</span><span class="v">${orbit.rp.toFixed(1)}</span></div>
          <div class="row"><span class="k">CURRENT Ap</span><span class="v">${orbit.ra.toFixed(1)}</span></div>
          <label style="font-size:10px; color: var(--fg-dim); display:block; margin-top:6px;">TARGET Pe:</label>
          <input id="oc-rp" type="number" value="${orbit.rp.toFixed(0)}" style="width:100%; background:#000; color: var(--fg); border: 1px solid var(--accent); padding: 4px; font-family: inherit;">
          <label style="font-size:10px; color: var(--fg-dim); display:block; margin-top:4px;">TARGET Ap:</label>
          <input id="oc-ra" type="number" value="${orbit.ra.toFixed(0)}" style="width:100%; background:#000; color: var(--fg); border: 1px solid var(--accent); padding: 4px; font-family: inherit;">
          <button class="btn-primary" style="margin-top:6px;" onclick="confirmOrbitChange()">COMPUTE BURNS</button>
          <button class="btn-danger" style="margin-top:4px;" onclick="closeOrbitChangePanel()">CANCEL</button>
        </div>
      `;
    }

    // Advanced manual steps (collapsible)
    if (advancedStepsOpen) {
      // Determine the tail state (orbit + tick) at the end of the current plan.
      let tailOrbit, tailTick;
      if (sortedNodes.length === 0) {
        tailOrbit = ship.orbit;
        tailTick = Math.max(tick, ship.orbit.epoch || 0);
      } else {
        const chain = computeNodeChain(ship);
        const lastLink = chain[chain.length - 1];
        tailOrbit = lastLink.postBurnOrbit;
        tailTick = lastLink.node.t;
      }
      let hasEncounter = false;
      let hasExit = false;
      let scanOrbit = tailOrbit;
      let scanTick = tailTick;
      for (let i = 0; i < 3; i++) {
        const ev = findNextSOIEvent(scanOrbit, scanTick, TRAJ_MAX_TICKS);
        if (!ev) break;
        if (ev.type === 'enter') hasEncounter = true;
        if (ev.type === 'exit') hasExit = true;
        if (!ev.newOrbit) break;
        scanOrbit = ev.newOrbit;
        scanTick = ev.t;
      }
      html += `<div style="margin-top:10px; padding:6px; border:1px dashed var(--fg-dim);">`;
      html += `<div class="section-label">ADVANCED · MANUAL STEPS</div>`;
      html += `<button class="btn-primary" style="margin-bottom:4px;" onclick="addStep('periapsis')">+ AT NEXT PERIAPSIS</button>`;
      html += `<button class="btn-primary" style="margin-bottom:4px;" onclick="addStep('apoapsis')">+ AT NEXT APOAPSIS</button>`;
      if (hasEncounter) html += `<button class="btn-primary" style="margin-bottom:4px;" onclick="addStep('encounter')">+ AT NEXT ENCOUNTER</button>`;
      if (hasExit) html += `<button class="btn-primary" onclick="addStep('exit')">+ AT NEXT SOI EXIT</button>`;
      html += `<div class="help" style="margin-top:6px;">Drag handles on the diamond to set Δv after adding.</div>`;
      html += `<button class="btn-danger" style="margin-top:6px;" onclick="toggleAdvancedSteps()">HIDE ADVANCED</button>`;
      html += `</div>`;
    } else {
      html += `<div style="margin-top:8px; text-align:center;"><a href="#" onclick="event.preventDefault(); toggleAdvancedSteps()" style="color: var(--fg-dim); font-size:10px;">Show advanced manual steps</a></div>`;
    }
  }

  if (sortedNodes.length > 0) {
    const hasUncommitted = sortedNodes.some(n => !n.committed && nodeDv(n) > 0);
    if (hasUncommitted) {
      html += `<button class="btn-primary" style="margin-top:8px;" onclick="commitAllPlanned()">COMMIT ALL UNCOMMITTED</button>`;
    }
    html += `<button class="btn-danger" style="margin-top:4px;" onclick="clearAllSteps()">CLEAR ALL STEPS</button>`;
  }

  html += `<div class="help" style="margin-top:12px;">Pick a high-level maneuver. The system computes the burns automatically. Use advanced manual steps to fine-tune.</div>`;

  document.getElementById('ship-panel-body').innerHTML = html;
}

function startTargetPicking() {
  pickingTarget = true;
  orbitChangePanelOpen = false;
  renderShipPanel();
  flashStatus('CLICK A PLANET ON THE MAP');
}

function cancelTargetPicking() {
  pickingTarget = false;
  renderShipPanel();
  flashStatus('TARGET SELECTION CANCELLED');
}

function openOrbitChangePanel() {
  orbitChangePanelOpen = true;
  pickingTarget = false;
  renderShipPanel();
}

function closeOrbitChangePanel() {
  orbitChangePanelOpen = false;
  renderShipPanel();
}

function toggleAdvancedSteps() {
  advancedStepsOpen = !advancedStepsOpen;
  renderShipPanel();
}

function confirmOrbitChange() {
  const rpInput = document.getElementById('oc-rp');
  const raInput = document.getElementById('oc-ra');
  if (!rpInput || !raInput) return;
  const targetRp = parseFloat(rpInput.value);
  const targetRa = parseFloat(raInput.value);
  if (!isFinite(targetRp) || !isFinite(targetRa) || targetRp <= 0 || targetRa <= 0) {
    flashStatus('INVALID Pe / Ap VALUES');
    return;
  }
  orbitChangePanelOpen = false;
  applyOrbitChange(targetRp, targetRa);
}

function addStep(anchor) {
  const ship = shipById[selectedShipId];
  if (!ship) return;
  const node = makeNode(anchor);
  ship.nodes.push(node);
  recomputeNodeTimes(ship);
  selectedNodeId = node.id;
  renderShipPanel();
  const labels = {
    periapsis: 'NEXT PERIAPSIS',
    apoapsis: 'NEXT APOAPSIS',
    encounter: 'NEXT ENCOUNTER',
    exit: 'NEXT SOI EXIT',
  };
  if ((anchor === 'encounter' || anchor === 'exit') && node.t <= tick + 0.1) {
    flashStatus(`NO ${labels[anchor]} FOUND IN PROJECTION — TRY MORE Δv FIRST`);
  } else {
    flashStatus(`STEP ADDED AT ${labels[anchor]}`);
  }
}

// Compute and add nodes for an orbit-change maneuver (single SOI).
function applyOrbitChange(targetRp, targetRa) {
  const ship = shipById[selectedShipId];
  if (!ship) return;
  const plan = planOrbitalManeuver(ship, targetRp, targetRa);
  if (plan.error) {
    flashStatus(plan.error.toUpperCase());
    return;
  }
  if (!applyPlanToShip(ship, plan)) {
    flashStatus('CANNOT APPLY ORBIT CHANGE');
    return;
  }
  selectedNodeId = ship.nodes[0]?.id ?? null;
  renderShipPanel();
  const totalDv = plan.steps.reduce((s, st) => s + Math.abs(st.dv_prograde), 0);
  flashStatus(`ORBIT MANEUVER · 2 BURNS · Δv ${totalDv.toFixed(2)}`);
}

// Compute and add nodes for a Hohmann transfer to another body, then capture.
function applyTransfer(targetBodyId) {
  const ship = shipById[selectedShipId];
  if (!ship) return;
  const plan = planTransferManeuver(ship, targetBodyId);
  if (plan.error) {
    flashStatus(plan.error.toUpperCase());
    return;
  }
  if (!applyPlanToShip(ship, plan)) {
    flashStatus('CANNOT APPLY TRANSFER');
    return;
  }
  selectedNodeId = ship.nodes[0]?.id ?? null;
  renderShipPanel();
  const target = byId[targetBodyId];
  const totalDv = plan.steps.reduce((s, st) => s + Math.abs(st.dv_prograde), 0);
  // Verify the plan actually captures by inspecting the chain
  const chain = computeNodeChain(ship);
  const captured = chain.length >= 2 &&
                   chain[1].preBurnOrbit.parentBodyId === targetBodyId &&
                   chain[1].postBurnOrbit.ra < target.soi;
  if (captured) {
    flashStatus(`TRANSFER → ${target.name.toUpperCase()} · Δv ${totalDv.toFixed(2)} · CAPTURED`);
  } else {
    flashStatus(`TRANSFER → ${target.name.toUpperCase()} · Δv ${totalDv.toFixed(2)} · CAPTURE UNCERTAIN`);
  }
}

function clearAllSteps() {
  const ship = shipById[selectedShipId];
  if (!ship) return;
  ship.nodes = [];
  selectedNodeId = null;
  invalidateTrajectory(ship);
  renderShipPanel();
  flashStatus('ALL STEPS CLEARED');
}

function commitNode(id) {
  const ship = shipById[selectedShipId];
  if (!ship) return;
  const node = ship.nodes.find(n => n.id === id);
  if (!node) return;
  if (nodeDv(node) <= 0) {
    flashStatus('CANNOT COMMIT · NO Δv SET');
    return;
  }
  node.committed = true;
  invalidateTrajectory(ship);
  renderShipPanel();
  flashStatus(`BURN COMMITTED · T+${(node.t - tick).toFixed(1)}`);
}

function commitAllPlanned() {
  const ship = shipById[selectedShipId];
  if (!ship) return;
  let count = 0;
  for (const n of ship.nodes) {
    if (!n.committed && nodeDv(n) > 0) {
      n.committed = true;
      count++;
    }
  }
  if (count > 0) {
    invalidateTrajectory(ship);
    renderShipPanel();
    flashStatus(`${count} BURN${count > 1 ? 'S' : ''} COMMITTED`);
  }
}

// ---------- EXECUTION ----------
function checkNodeExecution() {
  for (const ship of SHIPS) {
    // 1) Check for SOI transitions: is the ship still inside its parent's SOI?
    const parent = byId[ship.orbit.parentBodyId];
    const shipPos = orbitWorldPos(ship.orbit, tick);
    if (parent.id !== 'sol') {
      const pp = bodyPosition(parent, tick);
      const dx = shipPos.x - pp.x, dy = shipPos.y - pp.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist > parent.soi) {
        // Exit to parent of parent (Sol for planets)
        const newParentId = parent.parent;
        const wv = orbitWorldVelocity(ship.orbit, tick);
        const newOrbit = orbitFromWorldState(
          shipPos.x, shipPos.y, wv.x, wv.y,
          newParentId, tick, ship.orbit.period, semiMajor(ship.orbit)
        );
        if (newOrbit) {
          ship.orbit = newOrbit;
          recomputeNodeTimes(ship);
          flashStatus(`${ship.name.toUpperCase()} · ESCAPED ${parent.name.toUpperCase()} · NOW ORBITING ${byId[newParentId].name.toUpperCase()}`);
        }
      }
    }
    // Check entering any child body's SOI
    for (const body of BODIES) {
      if (body.id === 'sol' || body.id === ship.orbit.parentBodyId) continue;
      if (body.parent !== ship.orbit.parentBodyId) continue;
      const bp = bodyPosition(body, tick);
      const dx = shipPos.x - bp.x, dy = shipPos.y - bp.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < body.soi) {
        const wv = orbitWorldVelocity(ship.orbit, tick);
        const newOrbit = orbitFromWorldState(
          shipPos.x, shipPos.y, wv.x, wv.y,
          body.id, tick, ship.orbit.period, semiMajor(ship.orbit)
        );
        if (newOrbit) {
          ship.orbit = newOrbit;
          recomputeNodeTimes(ship);
          flashStatus(`${ship.name.toUpperCase()} · ENTERED ${body.name.toUpperCase()} SOI`);
        }
        break;
      }
    }

    // 2) Fire committed nodes whose time has come
    const sorted = [...ship.nodes].sort((a, b) => a.id - b.id);
    for (const node of sorted) {
      if (node.t <= tick && node.committed) {
        const cost = nodeFuelCost(node);
        if (ship.fuel >= cost) {
          const oldOrbit = preBurnOrbitForNode(ship, node);
          ship.orbit = applyNodeToOrbit(oldOrbit, node);
          ship.fuel -= cost;
          flashStatus(`${ship.name.toUpperCase()} · BURN · -${cost} FUEL`);
        } else {
          flashStatus(`${ship.name.toUpperCase()} · BURN SKIPPED · NO FUEL`);
        }
        ship.nodes = ship.nodes.filter(n => n.id !== node.id);
        recomputeNodeTimes(ship);
        if (selectedNodeId === node.id) selectedNodeId = null;
      }
    }
  }
}

// ---------- STATUS ----------
let statusTimer = null;
function flashStatus(msg) {
  const el = document.getElementById('status');
  el.innerHTML = `<span class="pulse"></span>${msg}`;
  el.classList.add('show');
  clearTimeout(statusTimer);
  statusTimer = setTimeout(() => el.classList.remove('show'), 3000);
}

// ---------- LOOP ----------
function loop(now) {
  const dt = (now - lastFrameTime) / 1000;
  lastFrameTime = now;

  if (simSpeed > 0) {
    tick += dt * simSpeed;
    checkNodeExecution();
    renderRoster();
    if (selectedShipId) renderShipPanel();
  }

  updateCamera();
  render();
  document.getElementById('tick-display').textContent = tick.toFixed(1);
  requestAnimationFrame(loop);
}

document.querySelectorAll('.time-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    simSpeed = parseInt(btn.dataset.speed);
  });
});

// ---------- BOOT ----------
focusBody('inara');
renderRoster();
flashStatus('READY · CLICK A SHIP TO PLAN MANEUVERS');
requestAnimationFrame(loop);

window.OS = { SHIPS, BODIES, byId, shipById, tick: () => tick };
</script>
